# AI Landing Page Generator — OSGi configuration
# Deploy to: digital-factory-data/karaf/etc/org.jahia.se.modules.ailandingpagegenerator.cfg

# ─── Anthropic API ────────────────────────────────────────────────────────────
# Required: your Anthropic API key
AI_API_KEY=your-anthropic-api-key-here

# Optional: base URL (default: https://api.anthropic.com)
AI_API_BASE_URL=https://api.anthropic.com

# Optional: model (default: claude-sonnet-4-6)
AI_MODEL=claude-sonnet-4-6

# Optional: max input tokens fed to the model (default: 100000)
AI_MAX_INPUT_TOKENS=100000

# Optional: max output tokens the model may produce (default: 8000)
AI_MAX_OUTPUT_TOKENS=8000

# Optional: HTTP timeout in milliseconds for the AI call (default: 60000)
AI_TIMEOUT_MS=60000

# ─── Rate limiting ────────────────────────────────────────────────────────────
# Max generation requests per user per minute (default: 5)
AI_RATE_LIMIT_PER_USER_PER_MINUTE=5

# ─── URL ingestion ────────────────────────────────────────────────────────────
# Comma-separated list of allowed hostnames for server-side URL fetch.
# Leave empty to disallow all URL fetching.
# Example: docs.mycompany.com,wiki.mycompany.com
AI_URL_FETCH_ALLOWED_HOSTS=

# Max response size in bytes for a fetched URL (default: 5 MB)
AI_URL_FETCH_MAX_SIZE_BYTES=5242880

# HTTP timeout in milliseconds for URL fetching (default: 10000)
AI_URL_FETCH_TIMEOUT_MS=10000

# ─── Unsplash image generation ───────────────────────────────────────────────
# Access key for the Unsplash API (obtain at https://unsplash.com/developers).
# When set, a relevant landscape photo is automatically fetched from Unsplash
# for each heroBanner (backgroundImage) and textImage (image) component and
# stored under /sites/{siteKey}/contents/landingPages/images/ in JCR.
# Leave empty to skip image generation (components will have no background image).
UNSPLASH_ACCESS_KEY=YOO3KreQp_2yypXC6RAqx2E0Y48bO11f-0VD70HY40M

# ─── UI configuration ─────────────────────────────────────────────────────────
# Comma-separated list of available target audiences shown in the dialog dropdown
AI_AUDIENCES=IT,Finance,Marketing,Sales,HR,C-Suite,General Public,Students,Developers

# Comma-separated list of available tones shown in the dialog dropdown
AI_TONES=Professional,Friendly,Bold,Playful,Authoritative,Witty,Inspirational,Concise,Verbose
